name: CreateUser API Tests
on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman

      - name: Run Tests
        run: newman run CreateUser.json -d CreateUserTestCases.json -r htmlextra --reporter-htmlextra-export reports/CreateUserTCReports.html
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
           name: api-test-report
           path: reports/CreateUserTCReports.html
      - name: Send results via email
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: '${{secrets.EMAILUSERNAME}}'
          password: '${{secrets.EMAILPASSWORD}}'
          subject: Automation Test Result
          to: aqsa3260@gmail.com
          from: '${{secrets.EMAILUSERNAME}}'
          attachments: reports/createUserReport.html
